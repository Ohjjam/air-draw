<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>✍️ 에어 드로잉</title>
<style>
  :root { --bg:#0d0d12; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif; color:#fff; }
  canvas#view { position:fixed; inset:0; width:100%; height:100%; touch-action:none; }

  /* 상태 표시 */
  #status { position:fixed; top:max(12px,env(safe-area-inset-top)); left:50%; transform:translateX(-50%); z-index:20;
    background:rgba(0,0,0,.45); backdrop-filter:blur(8px); padding:8px 16px; border-radius:99px;
    font-size:14px; font-weight:600; display:flex; align-items:center; gap:8px; transition:.2s; white-space:nowrap; }
  #status .dot { width:10px; height:10px; border-radius:50%; background:#777; transition:.15s; }
  #status.drawing .dot { background:#37e06b; box-shadow:0 0 12px #37e06b; }

  /* 툴바 */
  #toolbar { position:fixed; bottom:max(16px,env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); z-index:20;
    display:flex; align-items:center; gap:10px; background:rgba(20,20,28,.72); backdrop-filter:blur(12px);
    padding:10px 12px; border-radius:99px; border:1px solid rgba(255,255,255,.08); box-shadow:0 8px 30px rgba(0,0,0,.5);
    max-width:96vw; flex-wrap:nowrap; }
  #swatches { display:flex; gap:8px; align-items:center; }
  .swatch { width:28px; height:28px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:.15s; flex:0 0 auto; }
  .swatch.active { border-color:#fff; transform:scale(1.15); }
  .btn { width:40px; height:40px; border-radius:50%; border:none; background:rgba(255,255,255,.1); color:#fff;
    font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.12s; flex:0 0 auto; }
  .btn:active { transform:scale(.88); background:rgba(255,255,255,.22); }
  .sep { width:1px; height:26px; background:rgba(255,255,255,.12); flex:0 0 auto; }
  input[type=range] { width:70px; accent-color:#5b8cff; }

  /* 시작 화면 */
  #loading { position:fixed; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; background:var(--bg); text-align:center; padding:28px; }
  #loading h1 { margin:0; font-size:28px; }
  #loading p { margin:0; color:#cdd; line-height:1.6; }
  .start { margin-top:6px; padding:14px 34px; font-size:18px; font-weight:700; color:#fff; border:none; border-radius:99px;
    background:linear-gradient(135deg,#5b8cff,#9b5bff); cursor:pointer; box-shadow:0 8px 24px rgba(91,140,255,.4); }
  .start:active { transform:scale(.96); }
  #hint { color:#8a96a8; font-size:13px; max-width:300px; line-height:1.5; }
  .spinner { width:44px; height:44px; border:4px solid #333; border-top-color:#5b8cff; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #err { color:#ff6b6b; font-size:14px; max-width:320px; line-height:1.6; display:none; }
</style>
</head>
<body>
  <canvas id="view"></canvas>

  <div id="status"><span class="dot"></span><span id="statusText">시작을 눌러주세요</span></div>

  <div id="toolbar">
    <div id="swatches"></div>
    <span class="sep"></span>
    <input id="size" type="range" min="2" max="44" value="10" title="굵기">
    <span class="sep"></span>
    <button class="btn" id="flipCam" title="카메라 전환">🔄</button>
    <button class="btn" id="save" title="저장">💾</button>
    <button class="btn" id="clear" title="전체 지우기">🗑️</button>
  </div>

  <div id="loading">
    <h1>✍️ 에어 드로잉</h1>
    <p><b>검지</b>를 펴면 그려지고,<br><b>주먹</b>을 쥐면 펜이 꺼져요.<br>두 손가락(✌️)은 안 그리고 이동만.</p>
    <button id="startBtn" class="start">▶ 시작하기</button>
    <small id="hint">시작을 누르면 카메라 권한을 물어봐요. 허용해 주세요.</small>
    <div class="spinner" id="spin" style="display:none"></div>
    <div id="err"></div>
  </div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const view   = document.getElementById('view');
const ctx    = view.getContext('2d');
const draw   = document.createElement('canvas');   // 그림이 누적되는 레이어
const dctx   = draw.getContext('2d');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');
const loadingEl = document.getElementById('loading');
const errEl  = document.getElementById('err');
const spin   = document.getElementById('spin');

let dpr = Math.min(window.devicePixelRatio || 1, 2);

function resize(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  const vw = Math.round(innerWidth * dpr), vh = Math.round(innerHeight * dpr);
  // 기존 그림 보존
  const tmp = document.createElement('canvas');
  if (draw.width) { tmp.width = draw.width; tmp.height = draw.height; tmp.getContext('2d').drawImage(draw,0,0); }
  view.width = vw; view.height = vh; view.style.width = innerWidth+'px'; view.style.height = innerHeight+'px';
  draw.width = vw; draw.height = vh;
  if (tmp.width) dctx.drawImage(tmp, 0,0,tmp.width,tmp.height, 0,0,vw,vh);
}
addEventListener('resize', resize);
addEventListener('orientationchange', () => setTimeout(resize, 300));

/* ---------- 툴바 ---------- */
const COLORS = ['#ff3b3b','#ffb02e','#ffe14d','#37e06b','#3b9bff','#c46bff','#ffffff'];
let color = '#3b9bff', brush = 10, facing = 'user', mirror = true;
const swEl = document.getElementById('swatches');
COLORS.forEach(c => {
  const s = document.createElement('div');
  s.className = 'swatch' + (c===color ? ' active' : '');
  s.style.background = c;
  s.onclick = () => { color = c; document.querySelectorAll('.swatch').forEach(e=>e.classList.remove('active')); s.classList.add('active'); };
  swEl.appendChild(s);
});
document.getElementById('size').oninput = e => brush = +e.target.value;
document.getElementById('clear').onclick = () => dctx.clearRect(0,0,draw.width,draw.height);
document.getElementById('save').onclick = () => {
  const out = document.createElement('canvas'); out.width = draw.width; out.height = draw.height;
  const o = out.getContext('2d'); o.fillStyle = '#0d0d12'; o.fillRect(0,0,out.width,out.height); o.drawImage(draw,0,0);
  const a = document.createElement('a'); a.download = 'air-drawing.png'; a.href = out.toDataURL('image/png'); a.click();
};
document.getElementById('flipCam').onclick = async () => {
  facing = (facing==='user') ? 'environment' : 'user';
  mirror = (facing==='user');
  try { await startCamera(); } catch(e){ showErr(e); }
};

/* ---------- 손 추적 ---------- */
let handLandmarker, video, running=false, lastVideoTime=-1;
let smooth=null, lastPoint=null, cursor=null;

document.getElementById('startBtn').onclick = init;

async function init(){
  if (!window.isSecureContext) { showErr(new Error('insecure')); return; }
  document.getElementById('startBtn').style.display='none';
  document.getElementById('hint').style.display='none';
  spin.style.display='block';
  try {
    const fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    handLandmarker = await HandLandmarker.createFromOptions(fileset, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 1
    });
    await startCamera();
    resize();
    loadingEl.style.display='none';
    running = true;
    requestAnimationFrame(loop);
  } catch(e){ showErr(e); }
}

async function startCamera(){
  if (video && video.srcObject) video.srcObject.getTracks().forEach(t=>t.stop());
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: facing, width:{ideal:1280}, height:{ideal:720} }, audio:false
  });
  if (!video){ video = document.createElement('video'); video.playsInline = true; video.muted = true; }
  video.srcObject = stream;
  await video.play();
}

// 손가락이 펴졌는지: 끝마디가 중간마디보다 위에 있으면 펴진 것
const up = (lm, tip, pip) => lm[tip].y < lm[pip].y;

function loop(){
  if (!running) return;
  if (video.readyState >= 2 && video.videoWidth) {
    if (video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      handleResult(handLandmarker.detectForVideo(video, performance.now()));
    }
  }
  render();
  requestAnimationFrame(loop);
}

function handleResult(res){
  if (res && res.landmarks && res.landmarks.length){
    const lm = res.landmarks[0];
    const idx = up(lm,8,6), mid = up(lm,12,10);
    const drawing = idx && !mid;                 // 검지만 = 그리기
    let x = lm[8].x; if (mirror) x = 1 - x;       // 전면캠 거울 보정
    const px = x * view.width, py = lm[8].y * view.height;
    const a = 0.45;                               // 손떨림 보정(저역통과)
    if (!smooth) smooth = {x:px, y:py};
    else { smooth.x += (px-smooth.x)*a; smooth.y += (py-smooth.y)*a; }
    cursor = {x:smooth.x, y:smooth.y, drawing};

    if (drawing){
      if (lastPoint){
        dctx.strokeStyle = color; dctx.lineWidth = brush*dpr;
        dctx.lineCap='round'; dctx.lineJoin='round';
        dctx.beginPath(); dctx.moveTo(lastPoint.x,lastPoint.y); dctx.lineTo(smooth.x,smooth.y); dctx.stroke();
      }
      lastPoint = {x:smooth.x, y:smooth.y};
      setStatus('그리는 중 ✍️', true);
    } else {
      lastPoint = null;
      setStatus(mid ? '이동 모드 ✌️' : '펜 올림 — 검지를 펴세요', false);
    }
  } else {
    smooth = lastPoint = cursor = null;
    setStatus('손을 카메라에 보여주세요', false);
  }
}

function drawCover(c, img){
  const iw = img.videoWidth, ih = img.videoHeight; if (!iw) return;
  const cw = c.canvas.width, ch = c.canvas.height;
  const s = Math.max(cw/iw, ch/ih), w = iw*s, h = ih*s;
  c.drawImage(img, (cw-w)/2, (ch-h)/2, w, h);
}

function render(){
  const vw = view.width, vh = view.height;
  ctx.clearRect(0,0,vw,vh);
  if (video && video.videoWidth){
    ctx.save();
    if (mirror){ ctx.translate(vw,0); ctx.scale(-1,1); }
    ctx.globalAlpha = 0.32; drawCover(ctx, video); ctx.restore();
    ctx.globalAlpha = 1;
  }
  ctx.drawImage(draw, 0, 0);
  if (cursor){
    const r = cursor.drawing ? Math.max(brush*dpr/2, 6*dpr) : 12*dpr;
    ctx.beginPath(); ctx.arc(cursor.x, cursor.y, r, 0, Math.PI*2);
    ctx.fillStyle = cursor.drawing ? color : 'rgba(255,255,255,.45)';
    ctx.fill(); ctx.lineWidth = 2*dpr; ctx.strokeStyle = 'rgba(0,0,0,.45)'; ctx.stroke();
  }
}

function setStatus(t, d){ statusText.textContent = t; statusEl.classList.toggle('drawing', !!d); }

function showErr(e){
  spin.style.display='none'; errEl.style.display='block';
  let msg = (e && e.message) || String(e);
  if (!window.isSecureContext || msg==='insecure')
    msg = '⚠️ 카메라는 https에서만 열려요. file://로 연 거면 안 돼요 — GitHub Pages 같은 https 주소로 접속하세요.';
  else if (/NotAllowed|Permission|denied/i.test(msg))
    msg = '카메라 권한이 거부됐어요. 브라우저 주소창의 자물쇠 → 카메라 허용 후 새로고침하세요.';
  else if (/NotFound|Requested device/i.test(msg))
    msg = '카메라를 찾지 못했어요.';
  errEl.textContent = '에러: ' + msg;
  console.error(e);
}
</script>
</body>
</html>
